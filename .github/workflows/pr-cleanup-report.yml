name: LaunchDarkly Flag Cleanup Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ld-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install LaunchDarkly CLI
        run: npm install -g @launchdarkly/ldcli

      - name: Run cleanup analysis
        env:
          LD_ACCESS_TOKEN: ${{ secrets.LD_ACCESS_TOKEN }}
        shell: pwsh
        run: |
          ./scripts/ld-flag-cleanup.ps1 `
            -ConfigFile "./config/proj-env-config-example.json" # replace with your own config file

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ld-cleanup-report
          path: artifacts/*

      - name: Comment PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const body = fs.readFileSync('artifacts/pr-summary.txt', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } catch (error) {
              console.log('No PR summary file found or error reading file:', error.message);
            }
